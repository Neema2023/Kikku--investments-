{% extends 'base.html' %}

{% block title %}Login — Classic Investments CAR{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="auth-card p-4 p-md-5">
                <h2 style="color: #28a745 !important;">Login</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="phone_number">Phone Number</label>
                        <input
                            type="text"
                            name="phone_number"
                            id="phone_number"
                            class="form-control"
                            placeholder="+250..."
                            required
                        >
                    </div>
                    <div class="mb-4">
                        <label for="password">Password</label>
                        <input
                            type="password"
                            name="password"
                            id="password"
                            class="form-control"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-kikku-solid w-100" style="background-color: #28a745 !important; border-color: #28a745 !important; color: #fff !important;">
                        Login
                    </button>
                </form>
                <p class="text-center mt-4 mb-0" style="color: var(--kikku-text-muted); font-size: 0.9rem;">
                    Don't have an account?
                    <a href="{% url 'register' %}" style="color: #28a745 !important;">Register</a>
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
